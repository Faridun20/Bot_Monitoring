# Опциональный конфиг Nixpacks. .python-version и так подхватится,
# но явно фиксируем версию, чтобы билды были детерминированными.
[phases.setup]
nixPkgs = ["python311", "gcc"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "python -m src.main"
